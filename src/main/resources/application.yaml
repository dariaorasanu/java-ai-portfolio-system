spring:
  application:
    name: stocks

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5435/fiipractic?currentSchema=stocks
    username: stocksuser
    password: stockspassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/stock

server:
  port: 8081